name: Info

on:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Dependencies
        run: pip install -r info/requirements.txt

      - name: Run Script
        id: run_script
        run: python info/run_script.py
